- series_ticker: KXEFFR
  generating_process: continuous_underlyer
  payoff_type: terminal
  topic: financial
  difficulty: ambiguous
  tests: continuous_vs_scheduled_fixing
  also_acceptable: [scheduled_release]
  rationale: >
    Effective fed funds rate. Genuinely ambiguous: EFFR is derived from
    actual overnight lending transactions (market activity), but it is
    published once daily by the NY Fed (a scheduled fixing, not a
    continuously observable quote). Fed funds *futures* are continuously
    traded, but EFFR itself is not. We lean continuous_underlyer because
    the underlying transactions happen continuously, but scheduled_release
    is defensible since the settlement number is a daily publication.
    R2 review: 2 of 3 models preferred scheduled_release; we keep
    continuous_underlyer as primary but mark ambiguous.

