# ──────────────────────────────────────────────────────────────────────
# BOUNDARY: explicit_randomization vs convergent_binary
# ──────────────────────────────────────────────────────────────────────

- series_ticker: KXFEDCHAIRNOM
  generating_process: convergent_binary
  payoff_type: binary_event
  topic: government_policy
  difficulty: boundary
  tests: randomization_vs_convergent
  rationale: >
    "Who will be the next Fed Chair?" Currently classified as coin_flip/
    explicit_randomization, but this is WRONG. There is extensive
    information: candidate positioning, political signals, insider
    speculation. This is convergent_binary. It is NOT a randomization
    mechanism.

- series_ticker: KXSP500ADDQ
  generating_process: convergent_binary
  payoff_type: binary_event
  topic: financial
  difficulty: boundary
  tests: randomization_vs_convergent
  rationale: >
    "Will company X be added to S&P 500?" S&P committee decision.
    There IS predictive information (market cap, sector needs, eligibility).
    convergent_binary, not explicit_randomization. Also not scheduled_release —
    the S&P committee has no fixed known decision date.

- series_ticker: KXDNC28HOST
  generating_process: convergent_binary
  payoff_type: binary_event
  topic: politics_elections
  difficulty: boundary
  tests: randomization_vs_convergent
  rationale: >
    "DNC convention host city." Committee decision with lobbying,
    leaked preferences, bid processes. convergent_binary. Not
    scheduled_release — no fixed known announcement date.

- series_ticker: KXMICHELINSEA
  generating_process: convergent_binary
  payoff_type: binary_event
  topic: entertainment_sports
  difficulty: boundary
  tests: opaque_decision
  rationale: >
    "Michelin star designation." Expert panel decision. Some information
    exists (restaurant quality, critic reviews) but the panel's criteria
    are opaque. convergent_binary — opacity of the decision process does
    not make it randomization. Per the taxonomy's positive definition,
    explicit_randomization requires a documented randomization mechanism
    (dice, lottery balls, RNG). An opaque human decision is NOT the same
    as a random one.

# ──────────────────────────────────────────────────────────────────────
# BOUNDARY: opaque decisions (NOT randomization)
# ──────────────────────────────────────────────────────────────────────

- series_ticker: KXTIMEDECADE20S
  generating_process: convergent_binary
  payoff_type: binary_event
  topic: entertainment_sports
  difficulty: boundary
  tests: opaque_decision
  rationale: >
    "Time Person of the Decade." Editorial decision by Time magazine.
    Some information channel exists (public prominence, news coverage),
    but the decision is opaque. convergent_binary — opacity does not
    equal randomness. Per the taxonomy's positive definition,
    explicit_randomization requires a documented randomization mechanism.
    An opaque editorial decision is not random; it is merely hard to
    predict.

# ──────────────────────────────────────────────────────────────────────
# BOUNDARY: continuous_underlyer vs scheduled_release (gas prices)
# ──────────────────────────────────────────────────────────────────────

- series_ticker: KXAAAGASMAXCA
  generating_process: scheduled_release
  payoff_type: extremum
  topic: economic_data
  difficulty: boundary
  tests: continuous_vs_scheduled
  rationale: >
    "How high will gas prices in California get this year?" Gas prices
    are officially reported weekly by AAA/EIA — they are NOT a continuously
    traded asset like BTC or SPX. Settles on the officially reported number.
    scheduled_release with extremum payoff. Topic is economic_data, not financial.

- series_ticker: KXAAAGASW
  generating_process: scheduled_release
  payoff_type: binary_event
  topic: economic_data
  difficulty: boundary
  tests: continuous_vs_scheduled
  rationale: >
    "Gas prices weekly." Official AAA/EIA weekly report. scheduled_release.
    Even though gas prices change daily at the pump, the SETTLEMENT is
    on the officially reported statistic. Payoff is binary_event (not
    terminal) because for scheduled_release markets, terminal/barrier/extremum
    apply only when the process is continuous_underlyer. A threshold on an
    economic statistic is a binary event: "did the number come in above X?"

