# ──────────────────────────────────────────────────────────────────────
# BOUNDARY: terminal vs extremum/barrier payoff
# ──────────────────────────────────────────────────────────────────────

- series_ticker: KXBTCMAX100
  generating_process: continuous_underlyer
  payoff_type: barrier
  topic: financial
  difficulty: boundary
  tests: terminal_vs_barrier
  rationale: >
    "Will BTC reach $100K?" is a barrier/touch contract — resolves yes the
    moment BTC hits the level. Probability is monotonically non-decreasing
    once the underlyer approaches. NOT terminal (doesn't settle at a point).

- series_ticker: KXINXMAXY
  generating_process: continuous_underlyer
  payoff_type: extremum
  topic: financial
  difficulty: boundary
  tests: terminal_vs_extremum
  rationale: >
    "S&P 500 yearly max." Settles on the running maximum over the year.
    Path-dependent — very different dynamics from a terminal contract.

- series_ticker: KXBTCMINY
  generating_process: continuous_underlyer
  payoff_type: extremum
  topic: financial
  difficulty: boundary
  tests: terminal_vs_extremum
  rationale: Bitcoin yearly minimum. Running-minimum contract.

- series_ticker: KXBTCY
  generating_process: continuous_underlyer
  payoff_type: terminal
  topic: financial
  difficulty: boundary
  tests: terminal_vs_extremum
  rationale: >
    Bitcoin yearly price (end-of-year level). Terminal, NOT extremum —
    despite the yearly timeframe, it settles on the value at a specific time.

- series_ticker: SYNTHETIC_SPX_ATH
  generating_process: continuous_underlyer
  payoff_type: barrier
  topic: financial
  difficulty: boundary
  tests: barrier_vs_extremum
  rationale: >
    "Will the S&P 500 set a new all-time high this year?"
    This is barrier (resolves yes the moment the level is touched)
    not extremum (which settles on the running max/min value).
    The distinction: barrier resolves on FIRST touch; extremum settles
    on the aggregate statistic over the window.
  note: Synthetic.

# ──────────────────────────────────────────────────────────────────────
# BOUNDARY: scheduled_release vs convergent_binary
# ──────────────────────────────────────────────────────────────────────

- series_ticker: KXFEDDECISION
  generating_process: scheduled_release
  payoff_type: binary_event
  topic: government_policy
  difficulty: boundary
  tests: scheduled_vs_convergent
  rationale: >
    Fed rate decision type (cut/hold/hike) at known FOMC meeting date.
    Despite gradual signal accumulation (speeches, minutes, data),
    the decision is revealed at a known point. scheduled_release wins
    per the decision tree.

- series_ticker: KXSCOURT
  generating_process: convergent_binary
  payoff_type: binary_event
  topic: government_policy
  difficulty: boundary
  tests: scheduled_vs_convergent
  rationale: >
    "Who will be the next Supreme Court justice?" No known confirmation
    date when the market opens — the nomination and confirmation process
    unfolds over time. Information accumulates (shortlists, hearings).
    convergent_binary, not scheduled_release.

- series_ticker: KXRATECUTCOUNT
  generating_process: counting_process
  payoff_type: binary_event
  topic: government_policy
  difficulty: boundary
  tests: counting_vs_scheduled
  rationale: >
    "Number of Fed rate cuts this year." Even though each individual cut
    is a scheduled_release event, the market is on the cumulative COUNT.
    counting_process per the decision tree.

- series_ticker: KXFRENCHPRES
  generating_process: convergent_binary
  payoff_type: binary_event
  topic: politics_elections
  difficulty: boundary
  tests: scheduled_vs_convergent
  rationale: >
    French presidential election. The election date is known in advance,
    which might suggest scheduled_release. But the outcome is not a hidden
    number being revealed — it is actively being determined by voters via
    an information-accumulation process (polls, debates, campaigns).
    convergent_binary: the generating process is voter decision-making
    converging on an outcome, not an institution releasing a pre-determined
    value.

- series_ticker: SYNTHETIC_SCOTUS_RULING
  generating_process: convergent_binary
  payoff_type: binary_event
  topic: government_policy
  difficulty: ambiguous
  tests: scheduled_vs_convergent
  also_acceptable: [scheduled_release]
  rationale: >
    "Will the Supreme Court rule in favor of X in case Y?"
    Genuinely ambiguous: the ruling has an approximately known date
    (end of term), which fits scheduled_release. But oral arguments,
    leaked deliberations, and legal analysis provide gradual information,
    which fits convergent_binary. Both are defensible. convergent_binary
    preferred because the decision is not fully determined until the
    justices finalize their votes.

# ──────────────────────────────────────────────────────────────────────
# BOUNDARY: hazard_process vs convergent_binary
# ──────────────────────────────────────────────────────────────────────

- series_ticker: KXCABOUT
  generating_process: hazard_process
  payoff_type: binary_event
  topic: government_policy
  difficulty: boundary
  tests: hazard_vs_convergent
  rationale: >
    "Who will be the first cabinet member to depart?" Can happen at
    any time. Non-occurrence is informative. Classic hazard. Note:
    "first-to" markets are hazard because resolution time is endogenous —
    the market resolves the moment the event occurs, not at a fixed date.

- series_ticker: KXEPSTEINLIST
  generating_process: hazard_process
  payoff_type: binary_event
  topic: government_policy
  difficulty: boundary
