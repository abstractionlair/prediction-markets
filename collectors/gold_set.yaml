- series_ticker: KXNEXTIRANLEADER
  generating_process: convergent_binary
  payoff_type: binary_event
  topic: geopolitics
  difficulty: boundary
  tests: topic_geopolitics_vs_politics
  rationale: >
    "Who will be the next Supreme Leader of Iran?" Foreign political
