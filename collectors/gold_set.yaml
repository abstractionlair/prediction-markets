# Gold Set for Classifier Testing
#
# Each entry has expected labels and a rationale. Difficulty levels:
#   easy     — unambiguous, should always be correct
#   boundary — tests a specific decision boundary
#   ambiguous — defensible alternatives exist (listed in 'also_acceptable')

# ──────────────────────────────────────────────────────────────────────
