name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m venv venv
          venv/bin/pip install -e ".[dev]" --quiet

      - name: Run tests
        run: venv/bin/pytest tests/ -q -m "not db"

      - name: Lint
        run: venv/bin/ruff check trading/ research/ tests/
